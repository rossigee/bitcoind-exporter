# Pre-commit hooks for bitcoind-exporter
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-symlinks
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-docstring-first
      - id: debug-statements
      - id: detect-private-key
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: requirements-txt-fixer

  # Go-specific hooks
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-vet
      - id: go-imports
      - id: go-cyclo
        args: [-over=15]
      - id: go-mod-tidy
      - id: go-unit-tests
        env:
          RPC_USER: test
          RPC_PASS: test
      - id: golangci-lint

  # Security scanning
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
            .*\.lock$|
            .*\.log$|
            .*\.sum$|
            go\.mod$
          )$

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        args: [--ignore, DL3008, --ignore, DL3009]

  # YAML formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.0.3
    hooks:
      - id: prettier
        types_or: [yaml, markdown]

  # Commit message formatting
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v2.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [optional-scope]

  # Local hooks for custom validation
  - repo: local
    hooks:
      - id: go-no-replacement
        name: Avoid committing module replacements
        entry: go mod edit -dropreplace=all
        language: system
        pass_filenames: false
        types: [go]

      - id: go-test-coverage
        name: Go test coverage check
        entry: bash -c 'RPC_USER=test RPC_PASS=test go test -coverprofile=coverage.out ./... && go tool cover -func=coverage.out | grep total | awk "{if (\$3 < \"60%\") exit 1}"'
        language: system
        pass_filenames: false
        types: [go]

      - id: govulncheck
        name: Go vulnerability check
        entry: bash -c 'command -v govulncheck >/dev/null 2>&1 || go install golang.org/x/vuln/cmd/govulncheck@latest; govulncheck ./...'
        language: system
        pass_filenames: false
        types: [go]

      - id: go-build-check
        name: Go build check
        entry: go build -v ./...
        language: system
        pass_filenames: false
        types: [go]

      - id: docker-build-check
        name: Docker build check
        entry: bash -c 'if [ -f Dockerfile ]; then docker build -t bitcoind-exporter-test .; fi'
        language: system
        pass_filenames: false
        files: '^(Dockerfile.*|\.dockerignore)$'

# Configuration
default_stages: [pre-commit]
fail_fast: false
default_language_version:
  python: python3