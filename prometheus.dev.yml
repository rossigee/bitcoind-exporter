global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'bitcoind-exporter'
    static_configs:
      - targets: ['exporter:3000']
    scrape_interval: 30s
    metrics_path: /metrics
    params:
      format: ['prometheus']

  - job_name: 'bitcoind-exporter-health'
    static_configs:
      - targets: ['exporter:3000']
    scrape_interval: 10s
    metrics_path: /health
    params:
      format: ['json']